version: '3.9'

services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dao_db
      POSTGRES_USER: dao_user
      POSTGRES_PASSWORD: dao_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dao_user -d dao_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEBUG: "True"
      SECRET_KEY: "dao-dev-secret-key-change-in-production"
      DB_NAME: dao_db
      DB_USER: dao_user
      DB_PASSWORD: dao_password
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,0.0.0.0"
      EMAIL_BACKEND: "django.core.mail.backends.console.EmailBackend"
      DEFAULT_FROM_EMAIL: "noreply@dao-platform.ci"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    command: ["/app/entrypoint.sh"]

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DEBUG: "True"
      SECRET_KEY: "dao-dev-secret-key-change-in-production"
      DB_NAME: dao_db
      DB_USER: dao_user
      DB_PASSWORD: dao_password
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/0"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    command: ["celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=2"]

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: "http://backend:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev"]

volumes:
  pgdata:
  media_files:
